<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>在庫スキャナー</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --accent: #00e5a0;
    --accent2: #0090ff;
    --danger: #ff4d6d;
    --text: #e8eaf6;
    --text-dim: #6b7280;
    --border: rgba(255,255,255,0.08);
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .app {
    width: 100%;
    max-width: 480px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: 0 0 40px;
  }

  /* Header */
  .header {
    padding: 52px 24px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .header span {
    font-size: 11px;
    color: var(--text-dim);
    display: block;
    margin-top: 1px;
    font-weight: 400;
  }

  /* Main content */
  .content {
    flex: 1;
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Scanner card */
  .scanner-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .scan-viewport {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    background: #000;
    overflow: hidden;
    display: none;
  }
  .scan-viewport.active { display: block; }

  #camera-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .scan-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .scan-frame {
    width: 65%;
    aspect-ratio: 1;
    position: relative;
  }
  .scan-frame::before, .scan-frame::after,
  .scan-frame span::before, .scan-frame span::after {
    content: '';
    position: absolute;
    width: 28px; height: 28px;
    border-color: var(--accent);
    border-style: solid;
  }
  .scan-frame::before  { top: 0;    left: 0;    border-width: 3px 0 0 3px; }
  .scan-frame::after   { top: 0;    right: 0;   border-width: 3px 3px 0 0; }
  .scan-frame span::before { bottom: 0; left: 0;  border-width: 0 0 3px 3px; }
  .scan-frame span::after  { bottom: 0; right: 0; border-width: 0 3px 3px 0; }

  .scan-line {
    position: absolute;
    left: 10%; right: 10%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scanline 2s ease-in-out infinite;
    top: 10%;
  }
  @keyframes scanline {
    0%, 100% { top: 10%; opacity: 1; }
    50% { top: 85%; opacity: 0.6; }
  }

  .scan-hint {
    position: absolute;
    bottom: 12px;
    left: 0; right: 0;
    text-align: center;
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.3px;
  }

  #scan-canvas { display: none; }

  /* Scan button area */
  .scan-trigger {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .btn-scan {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, var(--accent), #00c47a);
    border: none;
    border-radius: 12px;
    color: #000;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.15s;
    -webkit-appearance: none;
  }
  .btn-scan:active { transform: scale(0.97); opacity: 0.9; }
  .btn-scan.scanning {
    background: linear-gradient(135deg, var(--danger), #e0002a);
    color: #fff;
  }

  .btn-scan svg { flex-shrink: 0; }

  /* Result display */
  .result-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    min-height: 48px;
  }
  .result-label {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    font-weight: 500;
  }
  .result-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    flex: 1;
    word-break: break-all;
  }
  .result-value.empty {
    color: var(--text-dim);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 400;
  }

  /* Input card */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .input-group label {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .input-group input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 17px;
    font-family: 'Noto Sans JP', sans-serif;
    padding: 14px 16px;
    width: 100%;
    outline: none;
    -webkit-appearance: none;
    transition: border-color 0.2s;
  }
  .input-group input:focus {
    border-color: var(--accent2);
  }
  .input-group input[type="number"] {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 1px;
  }
  .input-group input::placeholder {
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 400;
  }

  /* Submit button */
  .btn-submit {
    width: 100%;
    padding: 18px;
    background: var(--accent2);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.15s;
    -webkit-appearance: none;
    margin-top: 4px;
  }
  .btn-submit:active { transform: scale(0.97); }
  .btn-submit:disabled {
    opacity: 0.4;
    cursor: default;
  }
  .btn-submit.loading {
    background: var(--surface2);
    pointer-events: none;
  }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
    opacity: 0;
    z-index: 1000;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
  .toast.success { border-color: var(--accent); color: var(--accent); }
  .toast.error { border-color: var(--danger); color: var(--danger); }
  .toast.info { border-color: var(--accent2); color: var(--accent2); }

  /* GAS URL setting */
  .settings-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
  }
  .settings-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }
  .settings-title {
    font-size: 13px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .settings-arrow {
    color: var(--text-dim);
    font-size: 12px;
    transition: transform 0.2s;
  }
  .settings-arrow.open { transform: rotate(180deg); }
  .settings-body {
    display: none;
    margin-top: 14px;
  }
  .settings-body.open { display: block; }
  .settings-body input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    padding: 12px 14px;
    outline: none;
    -webkit-appearance: none;
    margin-bottom: 8px;
  }
  .settings-body input:focus { border-color: var(--accent2); }
  .btn-save-url {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
    padding: 10px 16px;
    cursor: pointer;
    -webkit-appearance: none;
    transition: background 0.15s;
  }
  .btn-save-url:active { background: var(--bg); }
  .url-status {
    font-size: 11px;
    margin-top: 6px;
    color: var(--text-dim);
  }
  .url-status.set { color: var(--accent); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-icon">📦</div>
    <div>
      <h1>在庫スキャナー</h1>
      <span>QRコードで在庫管理</span>
    </div>
  </div>

  <div class="content">

    <!-- Scanner card -->
    <div class="scanner-card">
      <div class="scan-viewport" id="scan-viewport">
        <video id="camera-video" playsinline autoplay muted></video>
        <canvas id="scan-canvas"></canvas>
        <div class="scan-overlay">
          <div class="scan-frame">
            <span></span>
            <div class="scan-line"></div>
          </div>
        </div>
        <div class="scan-hint">QRコードをフレーム内に合わせてください</div>
      </div>

      <div class="scan-trigger">
        <button class="btn-scan" id="btn-scan" onclick="toggleCamera()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          <span id="btn-scan-text">カメラを起動してスキャン</span>
        </button>

        <div class="result-row">
          <span class="result-label">商品コード</span>
          <span class="result-value empty" id="scanned-code">スキャン待ち...</span>
        </div>
      </div>
    </div>

    <!-- Input card -->
    <div class="input-card">
      <div class="input-group">
        <label>商品コード（手入力も可）</label>
        <input type="text" id="input-code" placeholder="例: ABC-12345" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      </div>
      <div class="input-group">
        <label>数量</label>
        <input type="number" id="input-qty" placeholder="0" min="0" inputmode="numeric" pattern="[0-9]*">
      </div>
      <button class="btn-submit" id="btn-submit" onclick="submitData()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        スプレッドシートに送信
      </button>
    </div>

    <!-- Settings -->
    <div class="settings-card">
      <div class="settings-header" onclick="toggleSettings()">
        <span class="settings-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M5.17 5.17a10 10 0 0 0 0 13.66"/></svg>
          GAS接続URL設定
        </span>
        <span class="settings-arrow" id="settings-arrow">▼</span>
      </div>
      <div class="settings-body" id="settings-body">
        <input type="url" id="gas-url-input" placeholder="https://script.google.com/macros/s/..." autocomplete="off">
        <div><button class="btn-save-url" onclick="saveGasUrl()">保存</button></div>
        <div class="url-status" id="url-status">URLが未設定です</div>
      </div>
    </div>

  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- jsQR CDN -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

<script>
let stream = null;
let scanning = false;
let scanInterval = null;

// GAS URL
let gasUrl = localStorage.getItem('gasUrl') || '';
updateUrlStatus();

function updateUrlStatus() {
  const el = document.getElementById('url-status');
  if (gasUrl) {
    el.textContent = '✓ URL設定済み';
    el.className = 'url-status set';
    document.getElementById('gas-url-input').value = gasUrl;
  } else {
    el.textContent = 'URLが未設定です';
    el.className = 'url-status';
  }
}

function saveGasUrl() {
  const val = document.getElementById('gas-url-input').value.trim();
  if (!val.startsWith('https://')) {
    showToast('有効なURLを入力してください', 'error'); return;
  }
  gasUrl = val;
  localStorage.setItem('gasUrl', gasUrl);
  updateUrlStatus();
  showToast('URLを保存しました', 'success');
}

function toggleSettings() {
  const body = document.getElementById('settings-body');
  const arrow = document.getElementById('settings-arrow');
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

// Camera
async function toggleCamera() {
  if (scanning) {
    stopCamera();
  } else {
    await startCamera();
  }
}

async function startCamera() {
  try {
    // iPhoneのSafariに最適化した制約
    const constraints = {
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 1280 },
        height: { ideal: 720 }
      },
      audio: false
    };

    stream = await navigator.mediaDevices.getUserMedia(constraints);

    const video = document.getElementById('camera-video');
    video.srcObject = stream;

    // iPhoneでは loadedmetadata 後に play() が必要
    video.onloadedmetadata = () => {
      video.play().then(() => {
        scanning = true;
        document.getElementById('scan-viewport').classList.add('active');
        document.getElementById('btn-scan').classList.add('scanning');
        document.getElementById('btn-scan-text').textContent = '✕ スキャン停止';
        startQrScan();
      }).catch(err => {
        console.error('play error:', err);
        showToast('カメラの再生に失敗しました', 'error');
      });
    };

  } catch (err) {
    console.error('Camera error:', err);
    let msg = 'カメラの起動に失敗しました';
    if (err.name === 'NotAllowedError') msg = 'カメラの許可が必要です。設定でSafariのカメラアクセスを許可してください';
    else if (err.name === 'NotFoundError') msg = 'カメラが見つかりません';
    else if (err.name === 'NotSupportedError') msg = 'HTTPS環境が必要です';
    showToast(msg, 'error');
  }
}

function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
  if (scanInterval) {
    clearInterval(scanInterval);
    scanInterval = null;
  }
  scanning = false;
  document.getElementById('scan-viewport').classList.remove('active');
  document.getElementById('btn-scan').classList.remove('scanning');
  document.getElementById('btn-scan-text').textContent = 'カメラを起動してスキャン';
  document.getElementById('camera-video').srcObject = null;
}

function startQrScan() {
  const video = document.getElementById('camera-video');
  const canvas = document.getElementById('scan-canvas');
  const ctx = canvas.getContext('2d');

  scanInterval = setInterval(() => {
    if (!scanning || video.readyState !== video.HAVE_ENOUGH_DATA) return;

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height, {
      inversionAttempts: 'dontInvert'
    });

    if (code) {
      const value = code.data;
      document.getElementById('scanned-code').textContent = value;
      document.getElementById('scanned-code').classList.remove('empty');
      document.getElementById('input-code').value = value;

      // 振動フィードバック（対応端末のみ）
      if (navigator.vibrate) navigator.vibrate(50);

      showToast('スキャン完了: ' + value, 'success');
      stopCamera();

      // 数量欄へフォーカス
      setTimeout(() => document.getElementById('input-qty').focus(), 300);
    }
  }, 200);
}

// Submit to GAS
async function submitData() {
  const code = document.getElementById('input-code').value.trim();
  const qty = document.getElementById('input-qty').value.trim();

  if (!code) { showToast('商品コードを入力またはスキャンしてください', 'error'); return; }
  if (qty === '') { showToast('数量を入力してください', 'error'); return; }
  if (!gasUrl) { showToast('GAS URLを設定してください（下の設定から）', 'error'); toggleSettings(); return; }

  const btn = document.getElementById('btn-submit');
  btn.classList.add('loading');
  btn.innerHTML = '<div class="spinner"></div> 送信中...';

  const today = new Date();
  const dateStr = today.getFullYear() + '/' +
    String(today.getMonth()+1).padStart(2,'0') + '/' +
    String(today.getDate()).padStart(2,'0');

  try {
    // no-cors で送信（GAS側でCORS設定済みの場合はcorsでもOK）
    await fetch(gasUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, qty: Number(qty), date: dateStr })
    });

    showToast('送信しました！', 'success');
    document.getElementById('input-code').value = '';
    document.getElementById('input-qty').value = '';
    document.getElementById('scanned-code').textContent = 'スキャン待ち...';
    document.getElementById('scanned-code').classList.add('empty');

  } catch (err) {
    console.error(err);
    showToast('送信エラー: ネットワークを確認してください', 'error');
  } finally {
    btn.classList.remove('loading');
    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>スプレッドシートに送信';
  }
}

// Toast
let toastTimer = null;
function showToast(msg, type = 'info') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show ' + type;
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    toast.classList.remove('show');
  }, 3000);
}

// Enter key on qty field
document.getElementById('input-qty').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitData();
});

// ページ離脱時にカメラ停止
window.addEventListener('pagehide', stopCamera);
window.addEventListener('beforeunload', stopCamera);
</script>
</body>
</html>
